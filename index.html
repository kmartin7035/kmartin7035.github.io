<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Author terminal</title>
    <meta name="description" content="Interactive author terminal.">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="paper-terminal">
    <main class="terminal" aria-label="Interactive author terminal">
        <header class="terminal-header">
            <div class="window-controls" aria-hidden="true">
                <span class="window-dot"></span>
                <span class="window-dot"></span>
                <span class="window-dot"></span>
            </div>
            <p class="terminal-title" id="terminal-title"></p>
        </header>

        <section class="terminal-main" aria-label="Terminal output and input">
            <div class="terminal-output" id="terminal-output" aria-live="polite" aria-atomic="false"></div>

            <form class="terminal-form" id="terminal-form" autocomplete="off">
                <label class="visually-hidden" for="command-input">Terminal command</label>
                <div class="terminal-prompt" id="active-prompt" aria-hidden="true">
                    <span class="prompt-host"></span>
                    <span class="prompt-path"></span>
                </div>
                <input
                    id="command-input"
                    class="command-input"
                    name="command"
                    type="text"
                    inputmode="text"
                    autocapitalize="none"
                    autocomplete="off"
                    autocorrect="off"
                    spellcheck="false"
                    placeholder="click a protocol or type --help"
                    disabled
                >
                <button class="submit-command" type="submit" disabled>run</button>
            </form>
            <p class="tab-hint" id="tab-hint" aria-live="polite"></p>
        </section>
    </main>

    <script src="site-config.js"></script>
    <script src="script.js"></script>
</body>
</html>
