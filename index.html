<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Katherine Martin</title>
    <meta name="description" content="Portfolio site for Katherine Martin.">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="paper-terminal">
    <main class="terminal" aria-label="Neon Spine terminal">
        <header class="terminal-header">
            <div class="window-controls" aria-hidden="true">
                <span class="window-dot window-dot--close"></span>
                <span class="window-dot window-dot--min"></span>
                <span class="window-dot window-dot--max"></span>
            </div>
            <p class="terminal-title" id="terminal-title"></p>
        </header>

        <section class="terminal-screen" aria-label="Site records">
            <pre class="terminal-name" id="terminal-name"></pre>

            <div class="terminal-stage">
                <pre class="jellyfish-art" id="jellyfish-art" aria-hidden="true"></pre>

                <section class="session-column" aria-label="Guest session">
                    <pre class="session-transcript" id="session-transcript"></pre>
                    <pre class="welcome-box" id="welcome-box"></pre>

                    <p class="prompt-line" aria-label="shell prompt">
                        <span class="prompt-text" id="prompt-text"></span>
                        <span class="cursor" aria-hidden="true"></span>
                    </p>

                    <p class="terminal-divider" id="terminal-divider" aria-hidden="true"></p>
                    <nav class="record-nav" id="record-nav" aria-label="Expandable terminal records"></nav>
                    <section class="record-panels" id="record-panels" aria-live="polite"></section>
                </section>
            </div>
        </section>
    </main>

    <script src="site-config.js"></script>
    <script src="script.js"></script>
</body>
</html>
